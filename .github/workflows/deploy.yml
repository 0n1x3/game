name: Deploy Game

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Shared Package
        run: pnpm --filter ./packages/shared build

      - name: Build Backend
        run: pnpm --filter ./packages/backend build

      - name: Build Frontend
        run: pnpm --filter ./packages/frontend build

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./packages/backend/Dockerfile
          push: true
          tags: 0n1x3/game-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./packages/frontend/Dockerfile
          push: true
          tags: 0n1x3/game-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH Check
        uses: appleboy/ssh-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          debug: true
          port: 22
          script_stop: true
          timeout: 30s
          command_timeout: 2m
          script: |
            set -e
            echo "SSH authentication succeeded"
            whoami
            hostname
            mkdir -p /root/game
            ls -ld /root /root/game

      - name: SSH Deploy to Server
        uses: appleboy/ssh-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          debug: true
          port: 22
          timeout: 30s
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            whoami
            echo "Starting deploy"
            mkdir -p /root/game
            cd /root/game || exit 1
            pwd
            ls -la

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            printf '%s\n' 'version: "3"' '' 'services:' '  backend:' '    image: 0n1x3/game-backend:latest' '    restart: always' '    ports:' '      - "3005:3005"' '    environment:' '      - MONGODB_URI=${{ secrets.MONGODB_URI }}' '      - BOT_TOKEN=${{ secrets.BOT_TOKEN }}' '' '  frontend:' '    image: 0n1x3/game-frontend:latest' '    restart: always' '    ports:' '      - "3000:3000"' > docker-compose.yml

            cat docker-compose.yml

            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose pull
              docker-compose down || true
              if ! docker-compose up -d --remove-orphans; then
                echo "docker-compose up failed, printing diagnostics"
                docker-compose ps || true
                docker-compose logs --tail=200 backend frontend || true
                docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}" || true
                exit 1
              fi
              docker-compose ps
            else
              docker compose pull
              docker compose down || true
              if ! docker compose up -d --remove-orphans; then
                echo "docker compose up failed, printing diagnostics"
                docker compose ps || true
                docker compose logs --tail=200 backend frontend || true
                docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}" || true
                exit 1
              fi
              docker compose ps
            fi

            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"
